name: L5 Agent Health Check

on:
  pull_request:
    paths:
      - "docs/agents/**"
      - "docs/l5/**"
      - ".github/workflows/**"

jobs:
  l5-policy-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required L5 files
        run: |
          test -f AGENTS.md
          test -f docs/GOVERNANCE.md
          test -f docs/V1_TRACEABILITY.md
          test -f docs/l5/SELF_EVOLUTION_ENGINE.md
          test -f docs/l5/PERFORMANCE_ANALYZER.md
          test -f docs/l5/SYSTEM_MUTATION_RULES.md
          test -f docs/l5/AGENT_REWRITE_LOG.md
          test -f docs/l5/EVOLUTION_PROPOSAL_TEMPLATE.md
          test -f docs/l5/L5_OPERATING_POLICY.md

      - name: Check agent docs exist
        run: |
          test -f docs/agents/PLANNER.md
          test -f docs/agents/BUILDER.md
          test -f docs/agents/REVIEWER.md
          test -f docs/agents/CI_AGENT.md

      - name: Check workflow templates exist
        run: |
          test -f .github/pull_request_template.md
          test -f .github/ISSUE_TEMPLATE/implementation-task.md
          test -f .github/ISSUE_TEMPLATE/l5-evolution-proposal.md
