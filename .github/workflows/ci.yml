name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend
        run: |
          cd backend
          npm install

      - name: Install frontend
        run: |
          cd frontend
          npm install

      - name: Build backend
        run: |
          cd backend
          npm run build || echo "no build script yet"

      - name: Build frontend
        run: |
          cd frontend
          npm run build || echo "no build script yet"
